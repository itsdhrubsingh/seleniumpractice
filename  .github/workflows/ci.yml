name: Selenium Pytest CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      env:
        BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:8000' }}
        BROWSER: chrome
        HEADLESS: true
        IMPLICIT_WAIT: 10
        EXPLICIT_WAIT: 15
      run: |
        pytest
