name: Selenium Pytest CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      env:
        BASE_URL: ${{ secrets.BASE_URL || 'https://itsdhrubsingh.github.io/seleniumpractice/' }}
        BROWSER: chrome
        HEADLESS: true
        IMPLICIT_WAIT: 10
        EXPLICIT_WAIT: 15
      run: |
        pytest

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: reports/
        retention-days: 30
