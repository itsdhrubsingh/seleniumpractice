# Workflow for testing and deploying static content to GitHub Pages
name: Test and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# Sets permissions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. Run Selenium Tests
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://itsdhrubsingh.github.io/seleniumpractice/' }}
          BROWSER: chrome
          HEADLESS: true
          IMPLICIT_WAIT: 10
          EXPLICIT_WAIT: 15
        run: |
          pytest

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: automation/reports/
          retention-days: 30

  # 2. Deploy to GitHub Pages (only if tests pass)
  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
