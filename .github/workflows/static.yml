# Workflow for testing and deploying static content to GitHub Pages
name: Test and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        default: 'prod'
        type: choice
        options:
          - dev
          - qa
          - prod

# Sets permissions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. Build and Upload Pages Artifact
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Generate Environments
        run: python3 build.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  # 2. Deploy to QA (Auto)
  deploy-qa:
    needs: build
    environment:
      name: qa
      url: ${{ steps.deployment-qa.outputs.page_url }}qa/
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment-qa
        uses: actions/deploy-pages@v4

  # 3. Test QA Environment
  test-qa:
    needs: deploy-qa
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests against QA
        run: |
          pytest --env qa
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: automation/reports/
          retention-days: 30

  # 4. Deploy to Prod (Needs Approval)
  deploy-prod:
    needs: test-qa
    environment:
      name: prod
      url: ${{ steps.deployment-prod.outputs.page_url }}prod/
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment-prod
        uses: actions/deploy-pages@v4

  # 5. Test Prod Environment
  test-prod:
    needs: deploy-prod
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests against Prod
        run: |
          pytest --env prod --html=reports/report_prod.html
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-prod
          path: automation/reports/
          retention-days: 30
